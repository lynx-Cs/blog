<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sinley Cooper - 个人博客</title>
    <style>
        :root {
            --bg-primary: #0a0c14;
            --bg-gradient: linear-gradient(135deg, #0a0c14 0%, #10152a 30%, #141a2e 60%, #0d1120 100%);
            --glass-bg: rgba(18, 22, 40, 0.55);
            --glass-bg-hover: rgba(25, 30, 50, 0.65);
            --glass-border: rgba(100, 140, 220, 0.12);
            --glass-border-hover: rgba(100, 140, 220, 0.3);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --glass-shadow-hover: 0 12px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(100, 140, 220, 0.15);
            --text-primary: #e4e8f0;
            --text-secondary: rgba(180, 190, 210, 0.75);
            --text-muted: rgba(140, 150, 175, 0.55);
            --accent: #6c8ce0;
            --accent-glow: rgba(108, 140, 224, 0.25);
            --accent-light: #8aabf5;
            --card-radius: 20px;
            --card-radius-sm: 14px;
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* 粒子背景 */
        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* 页面入场动画 */
        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .page-wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 80px 24px 60px;
            display: grid;
            grid-template-columns: 300px 1fr;
            gap: 28px;
            align-items: start;
            animation: pageEnter 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        /* === 玻璃卡片 === */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            box-shadow: var(--glass-shadow);
            transition: all var(--transition-smooth);
        }
        .glass-card.interactive:hover {
            background: var(--glass-bg-hover);
            border-color: var(--glass-border-hover);
            box-shadow: var(--glass-shadow-hover);
            transform: translateY(-2px);
        }

        /* === 左侧边栏 === */
        .sidebar-wrapper {
            position: relative;
            padding-top: 50px;
        }
        .sidebar {
            position: sticky;
            top: 80px;
            padding: 50px 28px 28px;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .avatar-wrap {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 88px;
            height: 88px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, rgba(108, 140, 224, 0.4), rgba(140, 160, 240, 0.15));
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3), 0 0 30px var(--accent-glow);
            z-index: 5;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .avatar-wrap:hover {
            transform: translateX(-50%) scale(1.08);
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a4fa0 0%, #6c8ce0 40%, #8aabf5 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            overflow: hidden;
            text-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .author-name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 2px;
            margin-top: 6px;
            background: linear-gradient(135deg, #e0e8ff, #b8c8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .author-bio-short {
            font-size: 0.88rem;
            color: var(--text-secondary);
            line-height: 1.6;
            min-height: 48px;
        }
        .cursor-blink {
            display: inline-block;
            width: 2px;
            height: 1em;
            background: var(--accent);
            vertical-align: text-bottom;
            margin-left: 2px;
            animation: cursorBlink 1s step-end infinite;
        }
        @keyframes cursorBlink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nav-link {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px 20px;
            border-radius: var(--card-radius-sm);
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.06);
            color: var(--text-primary);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.95rem;
            transition: all var(--transition-smooth);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .nav-link::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(108, 140, 224, 0.1), transparent);
            opacity: 0;
            transition: opacity var(--transition-smooth);
        }
        .nav-link:hover::before { opacity: 1; }
        .nav-link:hover {
            border-color: rgba(108, 140, 224, 0.4);
            box-shadow: 0 0 24px var(--accent-glow);
            transform: translateX(4px);
        }
        .nav-icon {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            background: rgba(108, 140, 224, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            color: var(--accent-light);
            flex-shrink: 0;
            transition: all var(--transition-smooth);
        }
        .nav-link:hover .nav-icon {
            background: rgba(108, 140, 224, 0.25);
            transform: scale(1.1);
        }
        .nav-arrow {
            margin-left: auto;
            color: var(--text-muted);
            font-size: 0.8rem;
            transition: all var(--transition-smooth);
        }
        .nav-link:hover .nav-arrow {
            transform: translateX(4px);
            color: var(--accent-light);
        }

        .sidebar-footer-text {
            margin-top: auto;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding-top: 16px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .visitor-counter {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        .visitor-divider { opacity: 0.3; }

        /* === 侧边栏讨论区 === */
        .sidebar-discuss {
            text-align: left;
            padding: 0 4px;
        }
        .sidebar-discuss-title {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .discuss-input-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-bottom: 10px;
        }
        .discuss-input {
            width: 100%;
            background: rgba(255,255,255,0.06);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 8px 10px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.8rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .discuss-input:focus {
            border-color: rgba(108, 140, 224, 0.4);
        }
        .discuss-textarea {
            resize: none;
            height: 52px;
        }
        .discuss-submit {
            align-self: flex-end;
            padding: 5px 14px;
            border-radius: 50px;
            background: rgba(108, 140, 224, 0.2);
            border: 1px solid rgba(108, 140, 224, 0.3);
            color: var(--accent-light);
            cursor: pointer;
            font-size: 0.78rem;
            transition: all 0.2s;
        }
        .discuss-submit:hover {
            background: rgba(108, 140, 224, 0.35);
        }
        .discuss-list {
            max-height: 180px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .discuss-list::-webkit-scrollbar { width: 4px; }
        .discuss-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 10px; }
        .discuss-item {
            padding: 8px 10px;
            border-radius: 8px;
            background: rgba(255,255,255,0.03);
            font-size: 0.78rem;
            line-height: 1.5;
            position: relative;
        }
        .discuss-item-name {
            font-weight: 600;
            color: var(--accent-light);
            font-size: 0.75rem;
        }
        .discuss-item-body {
            color: var(--text-secondary);
            margin-top: 2px;
            word-break: break-all;
        }
        .discuss-item-time {
            font-size: 0.65rem;
            color: var(--text-muted);
            margin-top: 3px;
        }
        .discuss-item-del {
            position: absolute;
            top: 6px;
            right: 8px;
            font-size: 0.65rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 1px 4px;
        }
        .discuss-item-del:hover { color: #ff6b6b; }
        .discuss-empty {
            text-align: center;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 10px 0;
        }

        /* === 右侧主内容 === */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .section-header {
            padding: 24px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-title {
            font-size: 1.3rem;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .section-title .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent);
            box-shadow: 0 0 12px var(--accent-glow);
        }
        .clock-display {
            font-size: 0.95rem;
            color: var(--text-secondary);
            font-family: var(--font-mono);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .clock-time-digit {
            font-weight: 600;
            color: var(--accent-light);
            font-size: 1.1rem;
        }

        /* === 文章列表 === */
        .posts-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .post-card {
            display: block;
            text-decoration: none;
            color: inherit;
            padding: 24px 28px;
            cursor: pointer;
        }
        .post-card-inner {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }
        .post-meta {
            display: flex;
            align-items: center;
            gap: 14px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .post-date {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .post-tag {
            padding: 3px 10px;
            border-radius: 50px;
            font-size: 0.75rem;
            background: rgba(108, 140, 224, 0.1);
            color: var(--accent-light);
            border: 1px solid rgba(108, 140, 224, 0.15);
        }
        .post-title {
            font-size: 1.2rem;
            font-weight: 700;
            line-height: 1.4;
            transition: color var(--transition-smooth);
        }
        .post-card:hover .post-title {
            color: var(--accent-light);
        }
        .post-excerpt {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.7;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .post-read-more {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--accent);
            font-weight: 500;
            transition: gap var(--transition-smooth);
        }
        .post-card:hover .post-read-more {
            gap: 10px;
        }

        /* === 文章页面 === */
        .article-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 24px 60px;
            animation: pageEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .article-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 16px;
            border-radius: 50px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all var(--transition-smooth);
            margin-bottom: 30px;
        }
        .article-back:hover {
            color: var(--accent-light);
            border-color: rgba(108, 140, 224, 0.3);
            background: rgba(108, 140, 224, 0.08);
        }
        .article-content {
            padding: 40px;
            line-height: 1.9;
        }
        .article-content h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .article-content .article-date {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .article-content h2 {
            font-size: 1.4rem;
            margin: 32px 0 16px;
            color: var(--accent-light);
        }
        .article-content h3 {
            font-size: 1.15rem;
            margin: 24px 0 12px;
        }
        .article-content p {
            margin-bottom: 16px;
            color: var(--text-secondary);
        }
        .article-content ul, .article-content ol {
            margin: 12px 0 20px 20px;
            color: var(--text-secondary);
        }
        .article-content li {
            margin-bottom: 8px;
        }
        .article-content code {
            background: rgba(108, 140, 224, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.88em;
            color: var(--accent-light);
        }
        .article-content pre {
            background: rgba(0,0,0,0.3);
            padding: 20px;
            border-radius: var(--card-radius-sm);
            overflow-x: auto;
            margin: 16px 0;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .article-content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
        }
        .article-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 12px 20px;
            margin: 16px 0;
            background: rgba(108, 140, 224, 0.05);
            border-radius: 0 var(--card-radius-sm) var(--card-radius-sm) 0;
            color: var(--text-secondary);
        }

        /* === 作者生平页面 === */
        .about-page {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 24px 60px;
            animation: pageEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        .about-header {
            text-align: center;
            padding: 40px;
            margin-bottom: 24px;
        }
        .about-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(135deg, #2a3050, #1a2040);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            color: var(--accent-light);
            box-shadow: 0 0 30px var(--accent-glow);
        }
        .about-name {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
        }
        .about-tagline {
            color: var(--text-secondary);
            margin-top: 8px;
            font-size: 0.95rem;
        }
        .about-body {
            padding: 36px;
            line-height: 1.9;
        }
        .about-body h3 {
            font-size: 1.2rem;
            color: var(--accent-light);
            margin: 28px 0 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255,255,255,0.06);
        }
        .about-body p {
            color: var(--text-secondary);
            margin-bottom: 14px;
        }
        .about-body ul {
            list-style: none;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.85rem;
            background: rgba(108, 140, 224, 0.1);
            color: var(--accent-light);
            border: 1px solid rgba(108, 140, 224, 0.15);
        }

        /* === 页脚 === */
        .page-footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.78rem;
            position: relative;
            z-index: 1;
        }
        .footer-tags {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 4px;
        }
        .footer-tag {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 0.75rem;
            color: var(--text-muted);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            transition: all var(--transition-smooth);
        }
        .footer-tag:hover {
            color: var(--accent-light);
            border-color: rgba(108, 140, 224, 0.3);
            background: rgba(108, 140, 224, 0.08);
        }

        /* === Toast === */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(20, 25, 45, 0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(108, 140, 224, 0.2);
            border-radius: 50px;
            padding: 12px 28px;
            color: var(--text-primary);
            font-size: 0.9rem;
            z-index: 1000;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }
        .toast.show { transform: translateX(-50%) translateY(0); }

        /* === 响应式 === */
        @media (max-width: 768px) {
            .page-wrapper {
                grid-template-columns: 1fr;
                gap: 60px;
                padding: 20px 16px 40px;
            }
            .sidebar-wrapper {
                padding-top: 44px;
            }
            .sidebar {
                position: relative;
                top: 0;
                padding: 48px 20px 24px;
            }
            .avatar-wrap {
                top: 4px;
                width: 72px;
                height: 72px;
            }
            .article-content {
                padding: 24px;
            }
            .article-content h1 {
                font-size: 1.5rem;
            }
            .about-header { padding: 30px 20px; }
            .about-body { padding: 24px; }
        }

        @media (max-width: 480px) {
            .page-wrapper { padding: 60px 12px 40px; }
            .section-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .post-card { padding: 18px 20px; }
            .post-title { font-size: 1.05rem; }
            .sidebar-wrapper { padding-top: 36px; }
            .sidebar { padding: 44px 16px 20px; }
            .avatar-wrap { top: 0; width: 64px; height: 64px; }
            .about-avatar { width: 80px; height: 80px; }
            .about-name { font-size: 1.4rem; }
        }

        /* prefers-reduced-motion */
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="page-wrapper">
        <!-- 左侧边栏 -->
        <div class="sidebar-wrapper">
            <div class="avatar-wrap">
                <div class="avatar"><img src="https://img.remit.ee/preview/BQACAgUAAyEGAASHRsPbAAEVwmJqNQ_ExIZClK_iCmHm-RewhtcQXwAC3iMAAmzbqFXL1UoX1va_dDwE.jpg" alt="avatar"></div>
            </div>
            <aside class="sidebar glass-card">
                <h1 class="author-name">Sinley Cooper</h1>
                <div class="author-bio-short">
                    <span id="typed-text"></span><span class="cursor-blink"></span>
                </div>
                <nav class="sidebar-nav">
                    <a href="about.html" class="nav-link">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
                            </svg>
                        </span>
                        <span>作者生平</span>
                        <span class="nav-arrow">→</span>
                    </a>
                    <a href="index.html" class="nav-link">
                        <span class="nav-icon">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                                <polyline points="14 2 14 8 20 8"/>
                                <line x1="16" y1="13" x2="8" y2="13"/>
                                <line x1="16" y1="17" x2="8" y2="17"/>
                            </svg>
                        </span>
                        <span>Blog 文章</span>
                        <span class="nav-arrow">→</span>
                    </a>
                </nav>

    <script>
        // ===== 数据版本（更新版本号自动清空旧数据） =====
        (function() {
            const VER = 'v3';
            const current = localStorage.getItem('_data_version');
            if (current !== VER) {
                // 清空所有旧数据
                Object.keys(localStorage).forEach(k => {
                    if (k.startsWith('blog_')) localStorage.removeItem(k);
                });
                localStorage.setItem('_data_version', VER);
            }
        })();

        // ===== 粒子背景 =====
        (function() {
            const canvas = document.getElementById('particles-canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];
            let animId;

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            resize();
            window.addEventListener('resize', resize);

            class Particle {
                constructor() {
                    this.reset();
                    this.y = Math.random() * canvas.height;
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = -10;
                    this.size = Math.random() * 2 + 0.5;
                    this.speedY = Math.random() * 0.4 + 0.15;
                    this.speedX = (Math.random() - 0.5) * 0.3;
                    this.opacity = Math.random() * 0.5 + 0.1;
                    this.fadeDirection = Math.random() > 0.5 ? 1 : -1;
                }
                update() {
                    this.y += this.speedY;
                    this.x += this.speedX;
                    this.opacity += this.fadeDirection * 0.003;
                    if (this.opacity >= 0.6) this.fadeDirection = -1;
                    if (this.opacity <= 0.1) this.fadeDirection = 1;
                    if (this.y > canvas.height + 10) this.reset();
                    if (this.x < -10) this.x = canvas.width + 10;
                    if (this.x > canvas.width + 10) this.x = -10;
                }
                draw() {
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(140, 165, 235, ${this.opacity})`;
                    ctx.fill();
                }
            }

            for (let i = 0; i < 80; i++) {
                particles.push(new Particle());
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => { p.update(); p.draw(); });
                // 连线
                for (let i = 0; i < particles.length; i++) {
                    for (let j = i + 1; j < particles.length; j++) {
                        const dx = particles[i].x - particles[j].x;
                        const dy = particles[i].y - particles[j].y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        if (dist < 120) {
                            ctx.beginPath();
                            ctx.moveTo(particles[i].x, particles[i].y);
                            ctx.lineTo(particles[j].x, particles[j].y);
                            ctx.strokeStyle = `rgba(140, 165, 235, ${0.06 * (1 - dist / 120)})`;
                            ctx.lineWidth = 0.5;
                            ctx.stroke();
                        }
                    }
                }
                animId = requestAnimationFrame(animate);
            }
            animate();
        })();

        // ===== 时钟 =====
        function updateClock() {
            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            document.getElementById('clock-time').textContent = `${h}:${m}:${s}`;
        }
        updateClock();
        setInterval(updateClock, 1000);

        // ===== 访客计数 (IP 去重) =====
        (function() {
            const today = new Date().toDateString();
            const STORE_KEY = 'blog_visitors_v2';
            async function countVisitor() {
                let stored = JSON.parse(localStorage.getItem(STORE_KEY) || '{"date":"","today":0,"total":0,"ips":{}}');
                if (stored.date !== today) { stored.date = today; stored.today = 0; stored.ips = {}; }
                // 尝试获取 IP
                let ip;
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    ip = data.ip;
                } catch(e) { /* 获取失败则用 localStorage 兜底 */ }
                const key = ip || 'local';
                if (!stored.ips[key]) {
                    stored.ips[key] = true;
                    stored.today++;
                    stored.total++;
                    localStorage.setItem(STORE_KEY, JSON.stringify(stored));
                }
                document.getElementById('visitor-today').textContent = stored.today;
                document.getElementById('visitor-total').textContent = stored.total;
            }
            countVisitor();
        })();

        // ===== 讨论区 (localStorage) =====
        function loadDiscuss() {
            return JSON.parse(localStorage.getItem('blog_discuss') || '[]');
        }
        function saveDiscuss(data) {
            localStorage.setItem('blog_discuss', JSON.stringify(data));
        }
        function renderDiscuss() {
            const data = loadDiscuss();
            const list = document.getElementById('discuss-list');
            if (data.length === 0) {
                list.innerHTML = '<div class="discuss-empty">暂无讨论，来发第一条吧</div>';
                return;
            }
            list.innerHTML = data.map((d, i) => `
                <div class="discuss-item">
                    <span class="discuss-item-del" onclick="delDiscuss(${i})" title="删除">&times;</span>
                    <div class="discuss-item-name">${escapeHtml(d.name)}</div>
                    <div class="discuss-item-body">${escapeHtml(d.body)}</div>
                    <div class="discuss-item-time">${d.time}</div>
                </div>
            `).join('');
        }
        function submitDiscuss() {
            const name = document.getElementById('discuss-name').value.trim();
            const body = document.getElementById('discuss-body').value.trim();
            if (!name) return showToast('请填写昵称');
            if (!body) return showToast('请填写内容');
            const data = loadDiscuss();
            data.unshift({ name, body, time: new Date().toLocaleString('zh-CN') });
            if (data.length > 50) data.length = 50;
            saveDiscuss(data);
            document.getElementById('discuss-name').value = '';
            document.getElementById('discuss-body').value = '';
            renderDiscuss();
            showToast('发送成功');
        }
        function delDiscuss(i) {
            if (!confirm('确定删除？')) return;
            const data = loadDiscuss();
            data.splice(i, 1);
            saveDiscuss(data);
            renderDiscuss();
        }
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        renderDiscuss();

        // ===== 打字机效果 =====
        (function() {
            const phrases = [
                '用代码书写无限可能。',
                '保持好奇，保持热爱。',
                '每一行代码都是对世界的理解。',
                'Think different, code better.',
            ];
            let phraseIdx = 0;
            let charIdx = 0;
            let isDeleting = false;
            const el = document.getElementById('typed-text');

            function type() {
                const current = phrases[phraseIdx];
                if (isDeleting) {
                    el.textContent = current.substring(0, charIdx - 1);
                    charIdx--;
                } else {
                    el.textContent = current.substring(0, charIdx + 1);
                    charIdx++;
                }

                let speed = isDeleting ? 40 : 80;
                if (!isDeleting && charIdx === current.length) {
                    speed = 2000;
                    isDeleting = true;
                } else if (isDeleting && charIdx === 0) {
                    isDeleting = false;
                    phraseIdx = (phraseIdx + 1) % phrases.length;
                    speed = 400;
                }
                setTimeout(type, speed);
            }
            type();
        })();

        // ===== Toast =====
        let toastTimer;
        function showToast(msg) {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
        }

        // ===== 文章数据 =====
        const posts = [
            {

            },
            {

                date: '2026-07-03',

            },

                id: 3,
                slug: 'css-animation-guide',
                title: 'CSS 动画完全指南：从入门到惊艳',

        // ===== 渲染文章列表 =====
        function renderPosts() {
            const container = document.getElementById('posts-list');
