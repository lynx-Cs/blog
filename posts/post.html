<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章 - Sinley Cooper Blog</title>
    <style>
        :root {
            --bg-primary: #0a0c14;
            --bg-gradient: linear-gradient(135deg, #0a0c14 0%, #10152a 30%, #141a2e 60%, #0d1120 100%);
            --glass-bg: rgba(18, 22, 40, 0.55);
            --glass-border: rgba(100, 140, 220, 0.12);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
            --text-primary: #e4e8f0;
            --text-secondary: rgba(180, 190, 210, 0.75);
            --text-muted: rgba(140, 150, 175, 0.55);
            --accent: #6c8ce0;
            --accent-glow: rgba(108, 140, 224, 0.25);
            --accent-light: #8aabf5;
            --card-radius: 20px;
            --card-radius-sm: 14px;
            --transition-smooth: 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            --font-main: system-ui, -apple-system, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Noto Sans SC", sans-serif;
            --font-mono: "SF Mono", "Cascadia Code", "Fira Code", monospace;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-main);
            background: var(--bg-gradient);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        #particles-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        @keyframes pageEnter {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .article-page {
            position: relative;
            z-index: 1;
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 24px 60px;
            animation: pageEnter 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(24px) saturate(140%);
            -webkit-backdrop-filter: blur(24px) saturate(140%);
            border: 1px solid var(--glass-border);
            border-radius: var(--card-radius);
            box-shadow: var(--glass-shadow);
        }

        .article-back {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all var(--transition-smooth);
            margin-bottom: 28px;
        }
        .article-back:hover {
            color: var(--accent-light);
            border-color: rgba(108, 140, 224, 0.3);
            background: rgba(108, 140, 224, 0.08);
            transform: translateX(-4px);
        }

        .article-content {
            padding: 48px 44px;
            line-height: 1.9;
        }
        .article-content h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 10px;
            letter-spacing: 1px;
            background: linear-gradient(135deg, #e0e8ff, #b8c8f0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .article-meta-row {
            display: flex;
            align-items: center;
            gap: 14px;
            margin-bottom: 32px;
            padding-bottom: 24px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .article-date {
            color: var(--text-muted);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .article-tag {
            padding: 3px 12px;
            border-radius: 50px;
            font-size: 0.78rem;
            background: rgba(108, 140, 224, 0.1);
            color: var(--accent-light);
            border: 1px solid rgba(108, 140, 224, 0.15);
        }
        .article-content h2 {
            font-size: 1.4rem;
            margin: 36px 0 16px;
            color: var(--accent-light);
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .article-content h3 {
            font-size: 1.15rem;
            margin: 28px 0 12px;
        }
        .article-content p {
            margin-bottom: 18px;
            color: var(--text-secondary);
        }
        .article-content ul, .article-content ol {
            margin: 12px 0 22px 24px;
            color: var(--text-secondary);
        }
        .article-content li {
            margin-bottom: 8px;
        }
        .article-content code {
            background: rgba(108, 140, 224, 0.12);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.88em;
            color: var(--accent-light);
            font-family: var(--font-mono);
        }
        .article-content pre {
            background: rgba(0,0,0,0.35);
            padding: 22px;
            border-radius: var(--card-radius-sm);
            overflow-x: auto;
            margin: 18px 0;
            border: 1px solid rgba(255,255,255,0.06);
        }
        .article-content pre code {
            background: none;
            padding: 0;
            color: var(--text-primary);
        }
        .article-content blockquote {
            border-left: 3px solid var(--accent);
            padding: 14px 22px;
            margin: 18px 0;
            background: rgba(108, 140, 224, 0.05);
            border-radius: 0 var(--card-radius-sm) var(--card-radius-sm) 0;
            color: var(--text-secondary);
            font-style: italic;
        }
        .article-content a {
            color: var(--accent-light);
            text-decoration: none;
            border-bottom: 1px dashed rgba(108, 140, 224, 0.3);
            transition: border-color var(--transition-smooth);
        }
        .article-content a:hover {
            border-bottom-style: solid;
        }
        .article-content img {
            max-width: 100%;
            border-radius: var(--card-radius-sm);
            margin: 16px 0;
        }

        .article-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 32px;
            gap: 16px;
        }
        .article-nav a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            transition: all var(--transition-smooth);
        }
        .article-nav a:hover {
            color: var(--accent-light);
            border-color: rgba(108, 140, 224, 0.3);
            background: rgba(108, 140, 224, 0.08);
        }
        .article-nav a.disabled {
            opacity: 0.3;
            pointer-events: none;
        }

        /* === 评论区 === */
        .comments-section {
            margin-top: 24px;
            padding: 36px 44px;
        }
        .comments-title {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .comments-title .count {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 400;
        }
        .comment-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }
        .comment-form-row {
            display: flex;
            gap: 12px;
        }
        .comment-input {
            flex: 1;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 10px 14px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.9rem;
            outline: none;
            transition: border-color var(--transition-smooth);
        }
        .comment-input:focus {
            border-color: rgba(108, 140, 224, 0.4);
        }
        .comment-textarea {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-family: var(--font-main);
            font-size: 0.9rem;
            outline: none;
            resize: vertical;
            min-height: 80px;
            transition: border-color var(--transition-smooth);
        }
        .comment-textarea:focus {
            border-color: rgba(108, 140, 224, 0.4);
        }
        .comment-submit {
            align-self: flex-end;
            padding: 8px 22px;
            border-radius: 50px;
            background: rgba(108, 140, 224, 0.2);
            border: 1px solid rgba(108, 140, 224, 0.3);
            color: var(--accent-light);
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all var(--transition-smooth);
        }
        .comment-submit:hover {
            background: rgba(108, 140, 224, 0.35);
            border-color: rgba(108, 140, 224, 0.5);
        }
        .comment-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .comment-item {
            padding: 16px;
            border-radius: var(--card-radius-sm);
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .comment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }
        .comment-avatar-sm {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: linear-gradient(135deg, #3a4fa0, #6c8ce0);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.75rem;
            font-weight: 700;
            color: #fff;
        }
        .comment-name {
            font-weight: 600;
            font-size: 0.9rem;
        }
        .comment-time {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .comment-body {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.6;
            padding-left: 42px;
        }
        .comment-delete {
            margin-left: auto;
            font-size: 0.75rem;
            color: var(--text-muted);
            cursor: pointer;
            padding: 2px 8px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .comment-delete:hover {
            color: #ff6b6b;
            background: rgba(255,107,107,0.1);
        }
        .comment-empty {
            text-align: center;
            padding: 30px;
            color: var(--text-muted);
            font-size: 0.9rem;
        }
        .comment-sync-btn {
            padding: 3px 8px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.12);
            background: rgba(255,255,255,0.04);
            color: var(--text-muted);
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .comment-sync-btn:hover {
            color: var(--accent-light);
            border-color: rgba(108,140,224,0.3);
            background: rgba(108,140,224,0.1);
        }
        .comment-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20,25,45,0.9);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(108,140,224,0.2);
            border-radius: 50px;
            padding: 10px 24px;
            color: var(--text-primary);
            font-size: 0.85rem;
            z-index: 9999;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            animation: toastIn 0.3s ease forwards;
        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes rippleOut {
            0% { transform: scale(0); opacity: 1; }
            100% { transform: scale(6); opacity: 0; }
        }

        /* === 文章双栏布局 === */
        .article-layout {
            display: grid;
            grid-template-columns: 1fr 240px;
            gap: 24px;
            align-items: start;
        }
        .article-main { min-width: 0; }

        /* === TOC 侧边栏 === */
        .article-sidebar {
            position: sticky;
            top: 24px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .toc-card {
            padding: 20px;
        }
        .toc-title {
            font-size: 0.85rem;
            font-weight: 700;
            margin-bottom: 12px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
        }
        .toc-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }
        .toc-item { }
        .toc-link {
            display: block;
            padding: 5px 10px;
            border-radius: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
            text-decoration: none;
            transition: all 0.2s;
            border-left: 2px solid transparent;
        }
        .toc-link:hover, .toc-link.active {
            color: var(--accent-light);
            background: rgba(108,140,224,0.08);
            border-left-color: var(--accent);
        }
        .toc-link.toc-h3 { padding-left: 22px; font-size: 0.75rem; }

        /* === 文章元数据卡片 === */
        .meta-card {
            padding: 18px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .meta-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .meta-row strong { color: var(--text-secondary); }

        /* === 联系方式 + 分享码 === */
        .article-contact {
            margin-top: 24px;
            padding: 28px 36px;
            text-align: center;
        }
        .contact-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 10px;
            margin-bottom: 12px;
        }
        .contact-chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.82rem;
            color: var(--text-secondary);
            text-decoration: none;
            border: 1px solid rgba(255,255,255,0.1);
            background: rgba(255,255,255,0.04);
            cursor: pointer;
            transition: all 0.2s;
        }
        .contact-chip:hover {
            color: var(--accent-light);
            border-color: rgba(108,140,224,0.3);
            background: rgba(108,140,224,0.08);
        }
        .share-section {
            margin-top: 12px;
            padding-top: 14px;
            border-top: 1px solid rgba(255,255,255,0.06);
        }
        .share-title {
            font-size: 0.82rem;
            color: var(--text-muted);
            margin-bottom: 8px;
        }
        .share-code-box {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 6px 16px;
            border-radius: 8px;
            background: rgba(108,140,224,0.1);
            border: 1px dashed rgba(108,140,224,0.25);
            cursor: pointer;
            transition: all 0.2s;
            font-family: var(--font-mono);
            font-size: 0.85rem;
            color: var(--accent-light);
            font-weight: 600;
            letter-spacing: 2px;
        }
        .share-code-box:hover {
            background: rgba(108,140,224,0.2);
            border-style: solid;
        }
        .share-hint {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .loading-placeholder {
            text-align: center;
            padding: 60px 0;
            color: var(--text-muted);
        }

        @media (max-width: 768px) {
            .article-content {
                padding: 28px 24px;
            }
            .article-content h1 { font-size: 1.5rem; }
            .article-content h2 { font-size: 1.2rem; }
            .article-layout {
                grid-template-columns: 1fr;
            }
            .article-sidebar {
                position: static;
                order: -1;
            }
            .toc-card { display: none; }
            .article-contact { padding: 20px; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <canvas id="particles-canvas"></canvas>

    <div class="article-page">
        <a href="../index.html" class="article-back">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
            </svg>
            返回首页
        </a>

        <div class="article-layout">
            <!-- 左栏：文章主体 -->
            <div class="article-main">
                <article class="article-content glass-card" id="article-content">
                    <div class="loading-placeholder"><p>加载文章中...</p></div>
                </article>

                <!-- 联系方式 + 分享码 -->
                <div class="article-contact glass-card" id="article-contact" style="display:none;">
                    <div class="contact-row">
                        <span class="contact-chip" onclick="handleContact('3255774340','QQ','tencent://message/?uin=3255774340')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                            QQ 3255774340
                        </span>
                        <span class="contact-chip" onclick="handleContact('Lynx3255','微信')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg>
                            WeChat Lynx3255
                        </span>
                        <span class="contact-chip" onclick="handleContact('lynx111','Telegram','tg://resolve?domain=lynx111','https://t.me/lynx111')">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                            Telegram @lynx111
                        </span>
                        <a href="mailto:CS@lynx.us.kg" class="contact-chip">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                            CS@lynx.us.kg
                        </a>
                    </div>
                    <div class="share-section">
                        <div class="share-title">📋 分享本页</div>
                        <span class="share-code-box" id="share-code" onclick="copyShareCode()" title="点击复制分享码">----</span>
                        <div class="share-hint">点击分享码复制，分享给朋友即可直达本文</div>
                    </div>
                </div>

                <div class="article-nav">
                    <a href="#" id="prev-link" class="disabled">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>
                        </svg>
                        上一篇
                    </a>
                    <a href="#" id="next-link" class="disabled">
                        下一篇
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/>
                        </svg>
                    </a>
                </div>

                <!-- 评论区 -->
                <div class="comments-section glass-card" style="margin-top:24px;">
                    <div class="comments-title">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                        评论区
                        <span class="count" id="comment-count">(0)</span>
                        <span style="margin-left:auto;display:flex;gap:6px;">
                            <button class="comment-sync-btn" onclick="exportComments()" title="导出评论">↓导出</button>
                            <button class="comment-sync-btn" onclick="document.getElementById('import-file').click()" title="导入评论">↑导入</button>
                            <input type="file" id="import-file" accept=".json" style="display:none" onchange="importComments(this)">
                        </span>
                    </div>
                    <div class="comment-form">
                        <div class="comment-form-row">
                            <input class="comment-input" id="comment-name" placeholder="你的昵称" maxlength="20">
                        </div>
                        <textarea class="comment-textarea" id="comment-body" placeholder="写下你的想法..." maxlength="500"></textarea>
                        <button class="comment-submit" onclick="submitComment()">发表评论</button>
                    </div>
                    <div class="comment-list" id="comment-list">
                        <div class="comment-empty">暂无评论，来说两句吧</div>
                    </div>
                </div>
            </div>

            <!-- 右栏：TOC + 元数据 -->
            <aside class="article-sidebar">
                <div class="toc-card glass-card" id="toc-card">
                    <div class="toc-title">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
                        目录
                    </div>
                    <ul class="toc-list" id="toc-list">
                        <li style="color:var(--text-muted);font-size:0.78rem;padding:4px 8px;">加载中...</li>
                    </ul>
                </div>

                    <h2>事件循环（Event Loop）</h2>
                    <p>事件循环是 JavaScript 异步编程的底层机制。它由以下几个部分组成：</p>
                    <ul>
                        <li><strong>调用栈（Call Stack）</strong>：执行同步代码</li>
                        <li><strong>任务队列（Task Queue）</strong>：存放宏任务（setTimeout、I/O 等）</li>
                        <li><strong>微任务队列（Microtask Queue）</strong>：存放微任务（Promise.then、MutationObserver 等）</li>
                    </ul>
                    <p>每轮事件循环中，先清空微任务队列，再执行一个宏任务。</p>

                    <h2>Promise</h2>
                    <p>Promise 是异步编程的核心抽象，它代表一个未来才会完成的操作：</p>
                    <pre><code>function fetchUser(id) {
  return fetch(\`/api/users/\${id}\`)
    .then(response => response.json())
    .then(data => {
      console.log('用户数据:', data);
      return data;
    })
    .catch(error => {
      console.error('获取失败:', error);
      throw error;
    });
}</code></pre>

                    <h2>Async/Await</h2>
                    <p>Async/Await 是 Promise 的语法糖，让异步代码看起来像同步代码：</p>
                    <pre><code>async function loadUserProfile(id) {
  try {
    const user = await fetchUser(id);
    const posts = await fetchPosts(user.id);
    return { user, posts };
  } catch (error) {
    console.error('加载失败:', error);
    return null;
  }
}</code></pre>

                    <h2>常见陷阱</h2>
                    <ul>
                        <li><strong>忘记 await</strong>：写了 async 但没有 await，函数实际同步返回了 Promise</li>
                        <li><strong>循环中的异步</strong>：forEach 不支持 async/await，应该用 for...of</li>
                        <li><strong>并行与串行</strong>：无依赖的请求应该用 Promise.all 并行执行</li>
                        <li><strong>错误处理</strong>：未捕获的 Promise 拒绝会导致 unhandledRejection</li>
                    </ul>

                    <blockquote>异步编程的本质不是让代码跑得更快，而是让代码在等待时不阻塞其他任务的执行。</blockquote>

                    <h2>观察者模式（Observer Pattern）</h2>
                    <p>最经典的前端设计模式之一。浏览器的事件系统就是观察者模式的实现：</p>
                    <pre><code>class EventBus {
  constructor() {
    this.events = {};
  }
  on(event, callback) {
    if (!this.events[event]) this.events[event] = [];
    this.events[event].push(callback);
  }
  emit(event, data) {
    (this.events[event] || []).forEach(cb => cb(data));
  }
  off(event, callback) {
    this.events[event] = (this.events[event] || [])
      .filter(cb => cb !== callback);
  }
}</code></pre>

                    <h2>策略模式（Strategy Pattern）</h2>
                    <p>当有多种算法或规则时，策略模式可以消除大量的 if-else：</p>
                    <pre><code>const validators = {
  email: (value) => /^[\\w.-]+@[\\w.-]+\\.\\w+$/.test(value),
  phone: (value) => /^1[3-9]\\d{9}$/.test(value),
  required: (value) => value != null && value !== '',
};

function validate(value, rules) {
  return rules.every(rule => validators[rule](value));
}</code></pre>

                    <h2>单例模式（Singleton Pattern）</h2>
                    <p>确保一个类只有一个实例，常用于全局状态管理：</p>
                    <pre><code>class AppStore {
  static instance = null;
  constructor() {
    if (AppStore.instance) return AppStore.instance;
    this.state = {};
    AppStore.instance = this;
  }
  getState() { return this.state; }
  setState(update) { Object.assign(this.state, update); }
}</code></pre>

                    <h2>装饰器模式（Decorator Pattern）</h2>
                    <p>在不修改原函数的情况下增加功能：</p>
                    <pre><code>function withLoading(fn) {
  return async function(...args) {
    showLoading();
    try {
      return await fn.apply(this, args);
    } finally {
      hideLoading();
    }
  };
}</code></pre>

                    <blockquote>设计模式不是教条，而是在特定场景下解决问题的工具。过度使用设计模式反而会让代码变得复杂。</blockquote>

                    <p>定期 rebase develop 分支可以减少冲突。遇到冲突时，仔细对比两边的改动，理解冲突的原因再解决。</p>

                    <h3>提交信息写什么？</h3>
                    <p>好的提交信息应该回答两个问题：做了什么？为什么这么做？避免写"fix bug"、"update code"这样无意义的信息。</p>

                    <blockquote>Git 工作流没有银弹。选择适合团队规模和项目特点的流程，并保持一致，比选择"最好"的流程更重要。</blockquote>
                `,
            },
        ];

        // ===== 渲染文章 =====
        function renderArticle() {
            const params = new URLSearchParams(window.location.search);
            const id = parseInt(params.get('id'));
            const post = posts.find(p => p.id === id);

            if (!post) {
                document.getElementById('article-content').innerHTML = '<div class="loading-placeholder"><p>文章未找到</p><a href="../index.html" style="color:var(--accent-light);">返回首页</a></div>';
                return;
            }

            document.title = post.title + ' - Xiong Da Blog';

            document.getElementById('article-content').innerHTML = `
                <h1>${post.title}</h1>
                <div class="article-meta-row">
                    <span class="article-date">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                        </svg>
                        ${post.date}
                    </span>
                    <span class="article-tag">${post.tag}</span>
                </div>
                ${post.content}
            `;

            // 上下篇导航
            const idx = posts.findIndex(p => p.id === id);
            const prevPost = posts[idx - 1];
            const nextPost = posts[idx + 1];
            const prevLink = document.getElementById('prev-link');
            const nextLink = document.getElementById('next-link');

            if (prevPost) {
                prevLink.href = 'post.html?id=' + prevPost.id;
                prevLink.classList.remove('disabled');
            }
            if (nextPost) {
                nextLink.href = 'post.html?id=' + nextPost.id;
                nextLink.classList.remove('disabled');
            }
        }

        renderArticle();

        // ===== 评论区 (localStorage) =====
        function getCommentKey() {
            const params = new URLSearchParams(window.location.search);
            return 'blog_comments_' + (params.get('id') || '0');
        }
        function loadComments() {
            const key = getCommentKey();
            return JSON.parse(localStorage.getItem(key) || '[]');
        }
        function saveComments(comments) {
            localStorage.setItem(getCommentKey(), JSON.stringify(comments));
        }
        function renderComments() {
            const comments = loadComments();
            const list = document.getElementById('comment-list');
            document.getElementById('comment-count').textContent = '(' + comments.length + ')';
            if (comments.length === 0) {
                list.innerHTML = '<div class="comment-empty">暂无评论，来说两句吧</div>';
                return;
            }
            list.innerHTML = comments.map((c, i) => `
                <div class="comment-item">
                    <div class="comment-header">
                        <div class="comment-avatar-sm">${(c.name || '?')[0].toUpperCase()}</div>
                        <span class="comment-name">${escapeHtml(c.name)}</span>
                        <span class="comment-time">${c.time}</span>
                        <span class="comment-delete" onclick="deleteComment(${i})" title="删除">×</span>
                    </div>
                    <div class="comment-body">${escapeHtml(c.body)}</div>
                </div>
            `).join('');
        }
        function submitComment() {
            const name = document.getElementById('comment-name').value.trim();
            const body = document.getElementById('comment-body').value.trim();
            if (!name) return showToast('请填写昵称');
            if (!body) return showToast('请填写评论内容');
            const comments = loadComments();
            comments.unshift({
                name: name,
                body: body,
                time: new Date().toLocaleString('zh-CN'),
            });
            saveComments(comments);
            document.getElementById('comment-name').value = '';
            document.getElementById('comment-body').value = '';
            renderComments();
            showToast('评论发表成功');
        }
        function deleteComment(index) {
            if (!confirm('确定删除这条评论？')) return;
            const comments = loadComments();
            comments.splice(index, 1);
            saveComments(comments);
            renderComments();
            showToast('评论已删除');
        }
        function escapeHtml(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
        function exportComments() {
            const data = JSON.stringify(loadComments(), null, 2);
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'blog-comments-' + getCommentKey() + '.json';
            a.click();
            URL.revokeObjectURL(a.href);
            showToast('评论已导出为 JSON 文件');
        }
        function importComments(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const imported = JSON.parse(e.target.result);
                    if (!Array.isArray(imported)) throw new Error('格式错误');
                    const existing = loadComments();
                    const merged = [...imported, ...existing];
                    saveComments(merged);
                    renderComments();
                    showToast('已导入 ' + imported.length + ' 条评论');
                } catch(err) {
                    showToast('导入失败：文件格式不正确');
                }
            };
            reader.readAsText(file);
            input.value = '';
        }
        renderComments();

        // ===== TOC 目录生成 =====
        function buildTOC() {
            const article = document.getElementById('article-content');
            const headings = article.querySelectorAll('h2, h3');
            const tocList = document.getElementById('toc-list');
            if (headings.length === 0) {
                tocList.innerHTML = '<li style="color:var(--text-muted);font-size:0.78rem;padding:4px 8px;">暂无目录</li>';
                return;
            }
            const items = [];
            headings.forEach((h, i) => {
                const id = 'heading-' + i;
                h.id = id;
                const isH3 = h.tagName === 'H3';
                items.push(`<li class="toc-item"><a href="#${id}" class="toc-link${isH3 ? ' toc-h3' : ''}" onclick="scrollToHeading(event,'${id}')">${h.textContent}</a></li>`);
            });
            tocList.innerHTML = items.join('');
            // 元数据
            const text = article.textContent;
            const wordCount = text.replace(/\s/g, '').length;
            const readTime = Math.max(1, Math.ceil(wordCount / 400));
            document.getElementById('meta-time').textContent = readTime;
            document.getElementById('meta-words').textContent = wordCount;
            // 显示联系方式
            document.getElementById('article-contact').style.display = '';
        }
        function scrollToHeading(e, id) {
            e.preventDefault();
            const target = document.getElementById(id);
            if (target) target.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
        // TOC 滚动高亮
        let tocLinks = [];
        function updateActiveTOC() {
            if (tocLinks.length === 0) {
                tocLinks = Array.from(document.querySelectorAll('.toc-link')).map(a => ({
                    el: a,
                    target: document.getElementById(a.getAttribute('href').slice(1))
                }));
            }
            let current = null;
            for (let i = tocLinks.length - 1; i >= 0; i--) {
                if (tocLinks[i].target && tocLinks[i].target.getBoundingClientRect().top < 200) {
                    current = i; break;
                }
            }
            tocLinks.forEach((t, i) => t.el.classList.toggle('active', i === current));
        }
        window.addEventListener('scroll', updateActiveTOC);

        // ===== 分享码 =====
        function generateShareCode() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id') || '0';
            // 生成 4 位字母数字码：基于 id + 日期哈希
            const seed = id + 'x' + new Date().getDate();
            let hash = 0;
            for (let i = 0; i < seed.length; i++) {
                hash = ((hash << 5) - hash) + seed.charCodeAt(i);
                hash |= 0;
            }
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 4; i++) {
                code += chars[Math.abs((hash >> (i * 5)) % chars.length)];
            }
            document.getElementById('share-code').textContent = '#' + code;
            document.getElementById('share-code').title = '分享码：#' + code + '（文章ID:' + id + '）';
        }
        function copyShareCode() {
            const code = document.getElementById('share-code').textContent;
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            // 同时把分享码和文章ID存到剪贴板的localStorage键里
            localStorage.setItem('share_code_' + code, id);
            navigator.clipboard.writeText(code).then(() => showToast('分享码已复制：' + code));
        }

        // ===== Toast =====
        function showToast(msg) {
            const t = document.createElement('div');
            t.className = 'comment-toast';
            t.textContent = msg;
            document.body.appendChild(t);
            setTimeout(() => { t.style.opacity = '0'; t.style.transition = 'opacity 0.3s'; setTimeout(() => t.remove(), 300); }, 1800);
        }

        // ===== 联系方式交互 =====
        function handleContact(value, label, protocolUrl, webFallback) {
            if (!protocolUrl) {
                navigator.clipboard.writeText(value).then(() => showToast(label + '已复制'));
                return;
            }
            const w = window.open(protocolUrl, '_blank');
            setTimeout(() => {
                if (document.hidden) return;
                navigator.clipboard.writeText(value).then(() => showToast('已复制 ' + label));
                if (webFallback) setTimeout(() => window.open(webFallback, '_blank'), 300);
                if (w && !w.closed) w.close();
            }, 800);
        }

        // ===== 全局点击涟漪 =====
        document.addEventListener('click', function(e) {
            const ripple = document.createElement('span');
            ripple.style.cssText = 'position:fixed;pointer-events:none;z-index:99999;width:24px;height:24px;border-radius:50%;background:radial-gradient(circle,rgba(108,140,224,0.5) 0%,rgba(108,140,224,0) 70%);will-change:transform,opacity;animation:rippleOut 0.6s cubic-bezier(0,0,0.2,1) forwards;left:' + (e.clientX - 12) + 'px;top:' + (e.clientY - 12) + 'px;';
            document.body.appendChild(ripple);
            ripple.addEventListener('animationend', () => ripple.remove());
        });

        // 在文章渲染完成后调用
        setTimeout(() => { buildTOC(); generateShareCode(); }, 100);
    </script>
</body>
